apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-farm-ingress
  namespace: smart-farm
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
  # First rule (catch-all for AWS ELB)
  - http:
      paths:
      - path: /predict
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: iot-service
            port:
              number: 80
              
  # Second rule for custom local domain bypass
  - host: farm.aws-internal.com
    http:
      paths:
      - path: /predict
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: iot-service
            port:
              number: 80