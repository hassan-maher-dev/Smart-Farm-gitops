apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-farm-ingress
  namespace: smart-farm
  annotations:
    kubernetes.io/ingress.class: nginx
    # السطر ده مهم تسيبه عشان لو بترفع صور للـ AI حجمها كبير
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
  - http:
      paths:
      # ====== توجيه الويب سايت (فلاتر) ======
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      # ====== توجيه الباك إند (AI) ======
      - path: /predict
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 80
      # ====== توجيه الباك إند (IoT) ======
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: iot-service
            port:
              number: 80